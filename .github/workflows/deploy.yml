name: Build Push and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./CryptoTracker
          file: ./CryptoTracker/CryptoTracker.Api/Dockerfile
          push: true
          tags: davutdoc/docfinal-api:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./yourprime-ui
          file: ./yourprime-ui/Dockerfile
          push: true
          tags: davutdoc/docfinal-ui:latest

      - name: Copy compose file to AWS VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/${{ secrets.AWS_USER }}/docfinal"

      - name: Deploy on AWS VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.AWS_USER }}/docfinal
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
